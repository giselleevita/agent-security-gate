name: Bug report
description: Report a reproducible defect that is not a security vulnerability.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not report vulnerabilities here. Follow SECURITY.md instead.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps, configuration, and sanitized inputs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
