name: Publish Benchmark Results

on:
  push:
    branches: [main]
    paths:
      - "benchmark/**"
      - "ci/thresholds.yaml"
      - "scripts/publish_benchmark_results.py"
      - ".github/workflows/publish-benchmark.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: 0.65.0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --constraint requirements-dev.lock -e '.[dev]'
      - name: Run benchmark comparison
        run: |
          python -m benchmark.runner \
            --scenarios benchmark/scenarios/scenarios.yaml \
            --baseline compare \
            --runs 5 \
            --summary results/summary.json \
            --comparison results/comparison.json \
            --report results/benchmark-report.md
      - name: Publish docs snapshot
        run: python scripts/publish_benchmark_results.py
      - name: Upload benchmark snapshot artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results-snapshot
          path: docs/benchmark-results/
      - name: Open PR for benchmark snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet docs/benchmark-results/; then
            echo "No benchmark snapshot changes to publish."
            exit 0
          fi
          BRANCH="ci/benchmark-results-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/benchmark-results/
          git commit -m "ci: update benchmark results snapshot"
          git push --force origin "$BRANCH"
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "PR already exists: #$EXISTING"
            exit 0
          fi
          gh pr create \
            --title "ci: update benchmark results snapshot" \
            --body "Automated benchmark snapshot from [\`${GITHUB_SHA::7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}). Merge to refresh [docs/benchmark-results/latest.md](docs/benchmark-results/latest.md)." \
            --head "$BRANCH" \
            --base main
