name: Publish Benchmark Results

on:
  push:
    branches: [main]
    paths:
      - "benchmark/**"
      - "ci/thresholds.yaml"
      - "scripts/publish_benchmark_results.py"
      - ".github/workflows/publish-benchmark.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: 0.65.0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --constraint requirements-dev.lock -e '.[dev]'
      - name: Run benchmark comparison
        run: |
          python -m benchmark.runner \
            --scenarios benchmark/scenarios/scenarios.yaml \
            --baseline compare \
            --runs 5 \
            --summary results/summary.json \
            --comparison results/comparison.json \
            --report results/benchmark-report.md
      - name: Publish docs snapshot
        run: python scripts/publish_benchmark_results.py
      - name: Commit benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/benchmark-results/
          git diff --staged --quiet || git commit -m "ci: update benchmark results snapshot"
          git push
