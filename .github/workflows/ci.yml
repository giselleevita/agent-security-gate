name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v7.0.0
        with:
          python-version: "3.11"
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: 0.65.0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --constraint requirements-dev.lock -e '.[dev,security]'
      - name: Audit dependencies
        run: pip-audit --skip-editable --progress-spinner off
      - name: Run tests
        run: pytest -m "not integration"
      - name: Generate SARIF
        run: |
          python -m benchmark.runner \
            --scenarios benchmark/scenarios/scenarios.yaml \
            --summary results/summary.json \
            --format sarif \
            --output results/benchmark.sarif
      - name: Compare enforcement baselines
        run: |
          python -m benchmark.runner \
            --scenarios benchmark/scenarios/scenarios.yaml \
            --baseline compare \
            --runs 5 \
            --summary results/summary.json \
            --comparison results/comparison.json \
            --report results/benchmark-report.md
      - name: Enforce benchmark thresholds
        run: python -m benchmark.gate --summary results/summary.json --thresholds ci/thresholds.yaml
      - name: Publish benchmark results for docs
        run: python scripts/publish_benchmark_results.py --comparison results/comparison.json --summary results/summary.json
      - name: Benchmark job summary
        run: |
          python <<'PY'
          import json, os
          from pathlib import Path
          c = json.loads(Path("results/comparison.json").read_text())
          g, n = c["baselines"]["gate"], c["baselines"]["no_gate"]
          d = c["deltas"]
          summary = f"""## Benchmark results (policy gate)

          | Metric | No gate | Policy gate | Delta |
          |---|---:|---:|---:|
          | ASR | {n['asr']:.1%} | {g['asr']:.1%} | {d['asr_reduction']:.1%} reduction |
          | Leakage | {n['leakage_rate']:.1%} | {g['leakage_rate']:.1%} | {d['leakage_reduction']:.1%} reduction |
          | False positives | {n['false_positive_rate']:.1%} | {g['false_positive_rate']:.1%} | {d['false_positive_change']:+.1%} |
          | Benign task success | {n['task_success_rate']:.1%} | {g['task_success_rate']:.1%} | {d['task_success_change']:+.1%} |
          """
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(summary)
          PY
      - name: Build benchmark evidence bundle
        env:
          ASG_EVIDENCE_SIGNING_KEY: ${{ secrets.ASG_EVIDENCE_SIGNING_KEY }}
        run: |
          python -m benchmark.evidence create \
            --artifact results/summary.json \
            --artifact results/comparison.json \
            --artifact results/benchmark-report.md \
            --artifact results/benchmark.sarif \
            --output results/evidence \
            --signing-key-env ASG_EVIDENCE_SIGNING_KEY
          python -m benchmark.evidence verify \
            --bundle results/evidence \
            --signing-key-env ASG_EVIDENCE_SIGNING_KEY
      - name: Upload benchmark evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-evidence
          path: results/evidence
      - name: Upload benchmark report artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-reports
          path: |
            results/comparison.json
            results/summary.json
            results/benchmark-report.md
            docs/benchmark-results/latest.md
            docs/benchmark-results/latest.json
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: results/benchmark.sarif

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v7.0.0
        with:
          python-version: "3.11"

      - name: Start stack
        run: |
          export ASG_UID="$(id -u)" ASG_GID="$(id -g)"
          docker compose up -d --build

      - name: Wait for gateway ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health/ready && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/health/ready

      - name: Show stack logs on readiness failure
        if: failure()
        run: docker compose logs --no-color

      - name: Run integration tests
        run: |
          python -m pip install --upgrade pip
          pip install --constraint requirements-dev.lock -e ".[dev]"
          pytest -m integration --timeout=30

      - name: Tear down
        if: always()
        run: docker compose down -v
