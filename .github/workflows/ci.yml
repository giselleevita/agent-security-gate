name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - uses: open-policy-agent/setup-opa@v2
        with:
          version: 0.65.0
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --constraint requirements-dev.lock -e '.[dev,security]'
      - name: Audit dependencies
        run: pip-audit --skip-editable --progress-spinner off
      - name: Run tests
        run: pytest -m "not integration"
      - name: Generate SARIF
        run: |
          python -m benchmark.runner \
            --scenarios benchmark/scenarios/scenarios.yaml \
            --summary results/summary.json \
            --format sarif \
            --output results/benchmark.sarif
      - name: Compare enforcement baselines
        run: |
          python -m benchmark.runner \
            --scenarios benchmark/scenarios/scenarios.yaml \
            --baseline compare \
            --runs 5 \
            --summary results/summary.json \
            --comparison results/comparison.json \
            --report results/benchmark-report.md
      - name: Enforce benchmark thresholds
        run: python -m benchmark.gate --summary results/summary.json --thresholds ci/thresholds.yaml
      - name: Build benchmark evidence bundle
        env:
          ASG_EVIDENCE_SIGNING_KEY: ${{ secrets.ASG_EVIDENCE_SIGNING_KEY }}
        run: |
          python -m benchmark.evidence create \
            --artifact results/summary.json \
            --artifact results/comparison.json \
            --artifact results/benchmark-report.md \
            --artifact results/benchmark.sarif \
            --output results/evidence \
            --signing-key-env ASG_EVIDENCE_SIGNING_KEY
          python -m benchmark.evidence verify \
            --bundle results/evidence \
            --signing-key-env ASG_EVIDENCE_SIGNING_KEY
      - name: Upload benchmark evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-evidence
          path: results/evidence
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          sarif_file: results/benchmark.sarif

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Start stack
        run: |
          export ASG_UID="$(id -u)" ASG_GID="$(id -g)"
          docker compose up -d --build

      - name: Wait for gateway ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health/ready && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/health/ready

      - name: Show stack logs on readiness failure
        if: failure()
        run: docker compose logs --no-color

      - name: Run integration tests
        run: |
          python -m pip install --upgrade pip
          pip install --constraint requirements-dev.lock -e ".[dev]"
          pytest -m integration --timeout=30

      - name: Tear down
        if: always()
        run: docker compose down -v
