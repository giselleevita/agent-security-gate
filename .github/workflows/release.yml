name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - uses: open-policy-agent/setup-opa@v2
        with:
          version: 0.65.0

      - name: Generate release benchmark report
        run: |
          python -m pip install --upgrade pip
          pip install --constraint requirements-dev.lock -e '.[dev]'
          python -m benchmark.runner \
            --scenarios benchmark/scenarios/scenarios.yaml \
            --baseline compare \
            --runs 5 \
            --summary results/summary.json \
            --comparison results/comparison.json \
            --report results/benchmark-report.md
          python scripts/publish_benchmark_results.py

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Agent Security Gate ${{ steps.version.outputs.VERSION }}"
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            results/benchmark-report.md
            results/comparison.json
            docs/benchmark-results/latest.md
