events {}

http {
    # Re-resolve the `gateway` service name on every request via Docker's embedded DNS
    # (127.0.0.11) so newly scaled replicas are picked up without reloading nginx.
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 8000;

        # Fast-fail a dead replica and retry against another instead of hanging.
        proxy_connect_timeout 2s;
        proxy_next_upstream error timeout http_502 http_503 http_504;

        location / {
            set $asg_upstream gateway:8000;
            proxy_pass http://$asg_upstream$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
