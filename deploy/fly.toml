# Fly.io demo deployment for Agent Security Gate gateway.
# Public reference demo — ASG_DEMO_MODE=true, documented demo tokens only.
# Deploy: ./scripts/fly_demo_bootstrap.sh (after flyctl auth login)

app = "asg-demo"
primary_region = "ams"

[build]
  dockerfile = "../Dockerfile.gateway"
  context = ".."

[env]
  ASG_DEMO_MODE = "true"
  ASG_ENFORCE_MODE = "off"
  POLICY_DATA_PATH = "/app/policies/data/policy_data.json"
  AUDIT_LOG_PATH = "/tmp/audit/events.jsonl"
  APPROVAL_RATE_LIMIT_MAX = "20"
  APPROVAL_RATE_LIMIT_WINDOW_S = "60"
  APPROVAL_TTL_S = "3600"
  # Demo JWT for resume tokens only — not a production secret.
  JWT_SECRET = "asg-demo-jwt-secret-minimum-32-bytes"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "45s"
    method = "GET"
    path = "/health/ready"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  app = "sh -c 'python -m scripts.migrate_db && uvicorn app.main:app --host 0.0.0.0 --port 8000'"
