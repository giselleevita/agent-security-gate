  <line x1="390" y1="95" x2="450" y2="95" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="305" y1="140" x2="305" y2="190" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="390" y1="225" x2="450" y2="225" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="160" y1="225" x2="220" y2="225" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="540" y1="95" x2="620" y2="70" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="540" y1="110" x2="620" y2="150" stroke="#475569" marker-end="url(#arrow)"/>
