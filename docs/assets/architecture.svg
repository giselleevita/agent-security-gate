    </style>
  </defs>
  <rect width="920" height="320" fill="#ffffff"/>
  <text x="20" y="28" class="title" font-size="18">Agent Security Gate  Architecture</text>
  <rect class="box" x="30" y="60" width="130" height="70"/>
  <text x="50" y="90" class="title">Agent client</text>
  <text x="50" y="110" class="sub">LangGraph / SDK</text>
  <rect class="box" x="220" y="50" width="170" height="90"/>
