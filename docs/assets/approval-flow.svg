<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="760" height="300" fill="#ffffff"/>
  <text x="20" y="28" font-size="18" font-weight="700" fill="#0f172a">Approval flow  db.write privilege escalation</text>
  <rect x="20" y="50" width="150" height="56" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="35" y="82" font-size="13" fill="#1e3a8a">1. Agent requests db.write</text>
  <rect x="200" y="50" width="150" height="56" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="215" y="82" font-size="13" fill="#713f12">2. OPA: approval_required</text>
  <rect x="380" y="50" width="150" height="56" rx="8" fill="#f3e8ff" stroke="#7c3aed"/>
  <text x="395" y="82" font-size="13" fill="#4c1d95">3. POST /v1/approvals/request</text>
  <rect x="560" y="50" width="170" height="56" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="575" y="82" font-size="13" fill="#065f46">4. Approver via /ui/approvals</text>
  <line x1="170" y1="78" x2="200" y2="78" stroke="#64748b" marker-end="url(#a)"/>
  <line x1="350" y1="78" x2="380" y2="78" stroke="#64748b" marker-end="url(#a)"/>
  <line x1="530" y1="78" x2="560" y2="78" stroke="#64748b" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/></marker></defs>
  <rect x="20" y="140" width="710" height="130" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="35" y="168" font-family="ui-monospace, monospace" font-size="11" fill="#334155">POST /v1/approvals/{id}/approve  Authorization: Bearer approver-token  X-Approver-Id: alice</text>
  <text x="35" y="190" font-family="ui-monospace, monospace" font-size="11" fill="#334155">’ {"status":"approved","resume_token":"eyJ..."}</text>
  <text x="35" y="220" font-family="ui-monospace, monospace" font-size="11" fill="#334155">POST /v1/gateway/decide  X-ASG-Resume-Token: eyJ...  ’ allowed + audit_id</text>
  <text x="35" y="250" font-family="ui-monospace, monospace" font-size="11" fill="#059669">Tool executes with bound audit_id · event appended to hash chain</text>
</svg>
