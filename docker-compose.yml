services:
  redis:
    image: redis:7.4.9-alpine3.21
    command: ["redis-server", "--appendonly", "no"]

  postgres:
    image: postgres:16.14-bookworm
    environment:
      POSTGRES_USER: asg
      POSTGRES_PASSWORD: asg
      POSTGRES_DB: asg
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  opa:
    image: openpolicyagent/opa:0.65.0-static
    command: run --server --addr :8181 /policies
    volumes:
      - ./policies:/policies:ro
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    command: sh -c "python -m scripts.migrate_db && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      AUTH_TOKEN: test-token
      APPROVER_TOKEN: approver-token
      JWT_SECRET: asg-demo-jwt-secret-minimum-32-bytes
      ASG_DEMO_MODE: "true"
      OPA_URL: http://opa:8181
      POLICY_DATA_PATH: /app/policies/data/policy_data.json
      AUDIT_LOG_PATH: /app/audit/events.jsonl
      DATABASE_URL: postgresql://asg:asg@postgres:5432/asg
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./audit:/app/audit
      - ./policies/data:/app/policies/data:ro
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    depends_on:
      - opa
      - postgres
      - redis

volumes:
  postgres_data:
