patterns:
  - name: ssn
    regex: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
  - name: api_key
    regex: "s\\x6b-[a-zA-Z0-9]+"
  - name: bearer_token
    regex: "Bearer\\s+[a-zA-Z0-9]+"
  - name: email
    regex: "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
  - name: iban
    regex: "\\b[A-Z]{2}\\d{2}[A-Z0-9]{4}\\d{7,}\\b"
